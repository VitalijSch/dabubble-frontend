<div [class.d-none]="isDirectMessagesHidden" class="users-container">
    @for (user of userService.users; track $index) {
    <div class="flex-container">
        <div class="avatar-container">
            <img src="{{userService.getAvatar(user)}}" alt="avatar">
            <div [class.online-status]="user.is_online" class="user-status"></div>
        </div>

        <span>{{getUsername(user)}}</span>
    </div>
    }
</div>
